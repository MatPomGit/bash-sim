<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bash-life — Gra w Życie (przeglądarka)</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #1a1e26;
      --panel-2: #222835;
      --text: #f3f6ff;
      --muted: #a3adbf;
      --accent: #4cc9f0;
      --alive: #80ed99;
      --dead: #2f3542;
      --grid: #1f2430;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      padding: 1rem;
      box-sizing: border-box;
    }

    .app {
      width: min(100%, 980px);
      background: var(--panel);
      border: 1px solid #2a3141;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 .4rem 0;
      font-size: 1.2rem;
    }

    .subtitle {
      margin: 0 0 1rem 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .8rem;
    }

    button {
      border: 1px solid #37415a;
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: .45rem .7rem;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    .status {
      color: var(--muted);
      margin-bottom: .8rem;
      font-size: .9rem;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid #323b52;
      background: #0c0f14;
      image-rendering: pixelated;
      display: block;
    }

    .hint {
      margin-top: .8rem;
      color: var(--muted);
      font-size: .85rem;
    }

    kbd {
      border: 1px solid #495675;
      border-bottom-width: 2px;
      border-radius: 4px;
      padding: 0 .3rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .8rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>bash-life w przeglądarce</h1>
    <p class="subtitle">Wersja JavaScript Gry w Życie Conwaya — inspirowana terminalowym wydaniem.</p>

    <div class="toolbar" aria-label="Sterowanie symulacją">
      <button id="toggleRun">Start</button>
      <button id="step">Krok</button>
      <button id="random">Losuj</button>
      <button id="clear">Wyczyść</button>
      <button id="glider">Glider</button>
      <button id="blinker">Blinker</button>
      <button id="wrap">Krawędzie: TORUS</button>
    </div>

    <div id="status" class="status">Gen: 0 | Żywe: 0 | Tryb: STOP | Krawędzie: TORUS</div>

    <canvas id="lifeCanvas" width="960" height="540" aria-label="Plansza gry"></canvas>

    <p class="hint">
      Skróty: <kbd>spacja</kbd> start/stop, <kbd>n</kbd> krok,
      <kbd>r</kbd> losuj, <kbd>c</kbd> czyść, <kbd>w</kbd> krawędzie.
      Kliknij komórkę, aby przełączyć jej stan.
    </p>
  </main>

  <script>
    // Stałe konfiguracji silnika i renderowania.
    const cols = 120;
    const rows = 68;
    const cellSize = 8;
    const randomDensity = 0.25;

    // Referencje do elementów UI.
    const canvas = document.getElementById('lifeCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    // Stan aplikacji.
    let running = false;
    let generation = 0;
    let wrapMode = true;
    let loopId = null;

    // Tablice planszy (aktualna i kolejna generacja).
    let grid = createGrid(0);
    let next = createGrid(0);

    // Tworzy nową planszę i wypełnia ją wartością startową.
    function createGrid(fillValue) {
      return Array.from({ length: rows }, () => Array(cols).fill(fillValue));
    }

    // Losuje planszę według zadanego zagęszczenia żywych komórek.
    function seedRandom() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          grid[r][c] = Math.random() < randomDensity ? 1 : 0;
        }
      }
      generation = 0;
      draw();
    }

    // Czyści planszę i resetuje licznik pokoleń.
    function clearGrid() {
      for (let r = 0; r < rows; r++) {
        grid[r].fill(0);
      }
      generation = 0;
      draw();
    }

    // Pobiera stan komórki z obsługą trybu zawijania lub granic twardych.
    function getCell(r, c) {
      if (wrapMode) {
        const wrappedRow = (r + rows) % rows;
        const wrappedCol = (c + cols) % cols;
        return grid[wrappedRow][wrappedCol];
      }
      if (r < 0 || r >= rows || c < 0 || c >= cols) {
        return 0;
      }
      return grid[r][c];
    }

    // Zlicza żywych sąsiadów danej komórki.
    function countNeighbors(r, c) {
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          count += getCell(r + dr, c + dc);
        }
      }
      return count;
    }

    // Wykonuje jeden krok symulacji i zwraca liczbę żywych komórek.
    function stepSimulation() {
      let aliveCount = 0;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const alive = grid[r][c] === 1;
          const neighbors = countNeighbors(r, c);

          if (alive && (neighbors === 2 || neighbors === 3)) {
            next[r][c] = 1;
          } else if (!alive && neighbors === 3) {
            next[r][c] = 1;
          } else {
            next[r][c] = 0;
          }

          aliveCount += next[r][c];
        }
      }

      // Zamienia referencje plansz, aby uniknąć kosztownych kopii.
      [grid, next] = [next, grid];
      generation += 1;
      return aliveCount;
    }

    // Umieszcza wzorzec na środku planszy.
    function placePattern(pattern) {
      const patternHeight = pattern.length;
      const patternWidth = pattern[0].length;
      const baseRow = Math.floor((rows - patternHeight) / 2);
      const baseCol = Math.floor((cols - patternWidth) / 2);

      for (let r = 0; r < patternHeight; r++) {
        for (let c = 0; c < patternWidth; c++) {
          if (pattern[r][c] === '1') {
            grid[baseRow + r][baseCol + c] = 1;
          }
        }
      }
      draw();
    }

    // Renderuje planszę i pasek statusu.
    function draw(aliveCount = countAlive()) {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillStyle = grid[r][c] === 1 ? '#80ed99' : '#2f3542';
          ctx.fillRect(c * cellSize, r * cellSize, cellSize - 1, cellSize - 1);
        }
      }

      statusEl.textContent = `Gen: ${generation} | Żywe: ${aliveCount} | Tryb: ${running ? 'RUN' : 'STOP'} | Krawędzie: ${wrapMode ? 'TORUS' : 'BORDER'}`;
    }

    // Liczy żywe komórki na planszy.
    function countAlive() {
      let alive = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          alive += grid[r][c];
        }
      }
      return alive;
    }

    // Pętla animacji uruchamiana przez requestAnimationFrame.
    function loop() {
      if (!running) return;
      const alive = stepSimulation();
      draw(alive);
      loopId = setTimeout(() => requestAnimationFrame(loop), 90);
    }

    // Przełącza tryb uruchomienia symulacji.
    function toggleRun() {
      running = !running;
      document.getElementById('toggleRun').textContent = running ? 'Pauza' : 'Start';
      if (running) {
        loop();
      } else if (loopId !== null) {
        clearTimeout(loopId);
      }
      draw();
    }

    // Obsługuje kliknięcia na planszy (ręczna edycja komórek).
    function handleCanvasClick(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (event.clientX - rect.left) * scaleX;
      const y = (event.clientY - rect.top) * scaleY;

      const c = Math.floor(x / cellSize);
      const r = Math.floor(y / cellSize);

      if (r >= 0 && r < rows && c >= 0 && c < cols) {
        grid[r][c] = grid[r][c] === 1 ? 0 : 1;
        draw();
      }
    }

    // Rejestruje zdarzenia przycisków i skrótów klawiaturowych.
    function bindEvents() {
      document.getElementById('toggleRun').addEventListener('click', toggleRun);
      document.getElementById('step').addEventListener('click', () => draw(stepSimulation()));
      document.getElementById('random').addEventListener('click', seedRandom);
      document.getElementById('clear').addEventListener('click', clearGrid);
      document.getElementById('glider').addEventListener('click', () => placePattern(['010', '001', '111']));
      document.getElementById('blinker').addEventListener('click', () => placePattern(['111']));
      document.getElementById('wrap').addEventListener('click', () => {
        wrapMode = !wrapMode;
        document.getElementById('wrap').textContent = `Krawędzie: ${wrapMode ? 'TORUS' : 'BORDER'}`;
        draw();
      });

      canvas.addEventListener('click', handleCanvasClick);

      window.addEventListener('keydown', (event) => {
        if (event.key === ' ') {
          event.preventDefault();
          toggleRun();
        } else if (event.key.toLowerCase() === 'n') {
          draw(stepSimulation());
        } else if (event.key.toLowerCase() === 'r') {
          seedRandom();
        } else if (event.key.toLowerCase() === 'c') {
          clearGrid();
        } else if (event.key.toLowerCase() === 'w') {
          wrapMode = !wrapMode;
          document.getElementById('wrap').textContent = `Krawędzie: ${wrapMode ? 'TORUS' : 'BORDER'}`;
          draw();
        }
      });
    }

    // Inicjalizacja aplikacji po załadowaniu dokumentu.
    function init() {
      canvas.width = cols * cellSize;
      canvas.height = rows * cellSize;
      bindEvents();
      seedRandom();
    }

    init();
  </script>
</body>
</html>
